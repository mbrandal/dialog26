<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#5D3A1A"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="dogFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="#2C3E50"/>
  
  <!-- Desk -->
  <rect x="50" y="280" width="400" height="25" rx="3" fill="url(#deskGrad)"/>
  <rect x="40" y="300" width="420" height="15" rx="2" fill="#5D3A1A"/>
  
  <!-- Monitor -->
  <rect x="180" y="120" width="180" height="130" rx="8" fill="#333"/>
  <rect x="190" y="130" width="160" height="100" rx="4" fill="url(#screenGrad)"/>
  
  <!-- Granngården logo on screen -->
  <rect x="210" y="150" width="120" height="60" rx="4" fill="#006633"/>
  <text x="270" y="175" font-family="Arial Black, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">GRANNGÅRDEN</text>
  <text x="270" y="195" font-family="Arial, sans-serif" font-size="10" fill="#90EE90" text-anchor="middle">Exception thrown</text>
  
  <!-- Monitor stand -->
  <rect x="255" y="250" width="30" height="30" fill="#333"/>
  <rect x="240" y="275" width="60" height="8" rx="2" fill="#444"/>
  
  <!-- Keyboard -->
  <rect x="200" y="285" width="100" height="12" rx="2" fill="#444"/>
  <rect x="205" y="287" width="90" height="8" rx="1" fill="#555"/>
  
  <!-- Coffee mug -->
  <ellipse cx="380" cy="275" rx="18" ry="8" fill="#8B0000"/>
  <rect x="362" y="255" width="36" height="22" rx="3" fill="#8B0000"/>
  <ellipse cx="380" cy="255" rx="15" ry="6" fill="#4a0000"/>
  <path d="M398 260 Q410 265 398 275" stroke="#8B0000" stroke-width="4" fill="none"/>
  <!-- Steam -->
  <path d="M375 245 Q372 235 378 225" stroke="#ccc" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M385 245 Q388 235 382 225" stroke="#ccc" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Dog body -->
  <ellipse cx="120" cy="250" rx="55" ry="45" fill="url(#dogFur)"/>
  
  <!-- Dog head -->
  <ellipse cx="140" cy="190" rx="45" ry="40" fill="url(#dogFur)"/>
  
  <!-- Dog snout -->
  <ellipse cx="170" cy="205" rx="25" ry="18" fill="#F5DEB3"/>
  <ellipse cx="178" cy="200" rx="8" ry="6" fill="#333"/>
  
  <!-- Dog eyes - confused look -->
  <ellipse cx="130" cy="180" rx="10" ry="12" fill="white"/>
  <ellipse cx="155" cy="180" rx="10" ry="12" fill="white"/>
  <circle cx="132" cy="182" r="5" fill="#4a3728"/>
  <circle cx="157" cy="178" r="5" fill="#4a3728"/>
  <circle cx="133" cy="181" r="2" fill="white"/>
  <circle cx="158" cy="177" r="2" fill="white"/>
  
  <!-- Eyebrows - worried -->
  <path d="M120 168 Q130 163 140 170" stroke="#8B7355" stroke-width="3" fill="none"/>
  <path d="M150 168 Q160 162 168 166" stroke="#8B7355" stroke-width="3" fill="none"/>
  
  <!-- Dog ears -->
  <ellipse cx="100" cy="160" rx="20" ry="30" fill="#C4A574" transform="rotate(-20 100 160)"/>
  <ellipse cx="175" cy="155" rx="18" ry="28" fill="#C4A574" transform="rotate(15 175 155)"/>
  
  <!-- Dog paws on desk -->
  <ellipse cx="155" cy="285" rx="20" ry="12" fill="url(#dogFur)"/>
  <ellipse cx="195" cy="285" rx="18" ry="10" fill="url(#dogFur)"/>
  
  <!-- Paw details -->
  <circle cx="148" cy="283" r="4" fill="#DEB887"/>
  <circle cx="155" cy="280" r="4" fill="#DEB887"/>
  <circle cx="162" cy="283" r="4" fill="#DEB887"/>
  
  <!-- Text bubble -->
  <rect x="220" y="50" width="250" height="55" rx="10" fill="white"/>
  <polygon points="230,105 250,105 235,125" fill="white"/>
  <text x="345" y="75" font-family="Impact, Arial Black, sans-serif" font-size="16" fill="#333" text-anchor="middle">I HAVE NO IDEA</text>
  <text x="345" y="95" font-family="Impact, Arial Black, sans-serif" font-size="16" fill="#333" text-anchor="middle">WHAT I AM DOING</text>
  
  <!-- Confused swirl above head -->
  <text x="90" y="130" font-size="24" fill="#FFD700">?</text>
  <text x="180" y="125" font-size="20" fill="#FFD700">?</text>
</svg>